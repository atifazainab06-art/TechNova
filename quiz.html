<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System Quiz Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad390, #f6d365, #fda085);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      color: #fff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      background: rgba(0, 0, 0, 0.7);
      border-radius: 20px;
      padding: 30px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2.2rem;
      color: #ffd369;
    }

    .question {
      font-size: 1.4rem;
      margin: 20px 0;
      color: #f9f871;
    }

    .options button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #43cea2, #185a9d);
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s;
    }

    .options button:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #00c6ff, #0072ff);
    }

    .score-lives {
      display: flex;
      justify-content: space-between;
      margin: 15px 0;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .lifeline button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: #ff6b6b;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .lifeline button:hover:enabled {
      background: #ff4757;
    }

    .popup {
      font-size: 2rem;
      position: absolute;
      animation: floatUp 2s forwards;
    }

    @keyframes floatUp {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-100px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌌 Solar System Quiz 🌠</h1>
    <div class="score-lives">
      <div>⭐ Score: <span id="score">0</span></div>
      <div>❤️ Lives: <span id="lives">3</span></div>
    </div>
    <div class="lifeline">
      <button id="lifeline">Use 50:50 Lifeline</button>
    </div>
    <div class="question" id="question">Question will appear here</div>
    <div class="options" id="options"></div>
    <div id="result"></div>
  </div>

  <script>
    const questions = [
      {q: "Which planet is known as the Red Planet?", options: ["Venus", "Mars", "Jupiter", "Saturn"], answer: 1},
      {q: "What is the largest planet in our solar system?", options: ["Earth", "Saturn", "Jupiter", "Neptune"], answer: 2},
      {q: "Which planet has rings?", options: ["Venus", "Earth", "Saturn", "Mars"], answer: 2},
      {q: "What is the hottest planet?", options: ["Mercury", "Venus", "Jupiter", "Mars"], answer: 1},
      {q: "Which celestial body is no longer a planet?", options: ["Pluto", "Neptune", "Eris", "Ceres"], answer: 0},
    ];

    let current = 0;
    let score = 0;
    let lives = 3;
    let lifelineUsed = false;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const lifelineBtn = document.getElementById("lifeline");

    function loadQuestion() {
      if (current >= questions.length) {
        questionEl.innerHTML = `🎉 Game Over! Final Score: ${score}`;
        optionsEl.innerHTML = `<button onclick='location.reload()'>Play Again</button>`;
        return;
      }
      let q = questions[current];
      questionEl.textContent = q.q;
      optionsEl.innerHTML = "";
      q.options.forEach((opt, i) => {
        const btn = document.createElement("button");
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(i);
        optionsEl.appendChild(btn);
      });
    }

    function checkAnswer(i) {
      if (i === questions[current].answer) {
        score += 100;
        popup(["🎈", "🌸", "✨", "🎉"][Math.floor(Math.random()*4)]);
      } else {
        lives -= 1;
        score = Math.max(0, score - 50);
        popup(["😢", "😞", "💔"][Math.floor(Math.random()*3)]);
        if (lives <= 0) {
          questionEl.innerHTML = `😔 You lost! Final Score: ${score}`;
          optionsEl.innerHTML = `<button onclick='location.reload()'>Try Again</button>`;
          livesEl.textContent = 0;
          return;
        }
      }
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      current++;
      setTimeout(loadQuestion, 800);
    }

    lifelineBtn.onclick = () => {
      if (lifelineUsed) return;
      lifelineUsed = true;
      lifelineBtn.disabled = true;
      let q = questions[current];
      let wrongOptions = [0,1,2,3].filter(i => i !== q.answer);
      let toDisable = wrongOptions.sort(() => 0.5 - Math.random()).slice(0,2);
      const btns = optionsEl.querySelectorAll("button");
      toDisable.forEach(i => btns[i].disabled = true);
    };

    function popup(icon) {
      const span = document.createElement("span");
      span.className = "popup";
      span.style.left = Math.random() * 80 + "%";
      span.style.top = "60%";
      span.textContent = icon;
      document.body.appendChild(span);
      setTimeout(() => span.remove(), 2000);
    }

    loadQuestion();
  </script>
</body>
</html>
